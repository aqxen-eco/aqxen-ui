name: Deploy Upscale

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install pnpm
        run: curl -fsSL https://get.pnpm.io/install.sh | sh -
          
      - name: Set up node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        # continue-on-error: true # remove meeeeeee
        run: pnpm lint --fix

      - name: Build
        run: pnpm build

      - name: Archive build
        run: tar -czf upscale.tar.gz .next package.json public node_modules .env

      - name: Transfer build to host
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "upscale.tar.gz"
          target: "/root/upscale"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/upscale
            tar -xzf upscale.tar.gz
            systemctl restart upscale
            systemctl restart nginx
            systemctl status upscale --no-pager
