name: Deploy Upscale

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: [self-hosted]
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up node
        shell: bash -l {0}
        run: |
          nvm install 22
          nvm use 22

      - name: Install & configure pnpm
        shell: bash -l {0}
        run: |
          npm install -g pnpm

      - name: Install dependencies
        shell: bash -l {0}
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        shell: bash -l {0}
        run: pnpm prisma generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Run ESLint
        shell: bash -l {0}
        run: pnpm lint

      - name: Build
        shell: bash -l {0}
        run: pnpm build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
          NEXT_PUBLIC_PINATA_GATEWAY: ${{ vars.NEXT_PUBLIC_PINATA_GATEWAY }}
          NEXT_PUBLIC_NETWORK: ${{ vars.NEXT_PUBLIC_NETWORK }}

      - name: Archive build
        run: tar -czf build.tar.gz --exclude=.git --exclude=build.tar.gz .[!.]* *

      - name: Transfer build to host
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'build.tar.gz'
          target: ${{ vars.DEPLOY_FOLDER }}
          overwrite: true

      - name: Deploy build and run migrations
        uses: appleboy/ssh-action@v0.1.7
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,SESSION_SECRET
          script: |
            cd ${{ vars.DEPLOY_FOLDER }}
            tar -xzf build.tar.gz
            export PATH="/root/.local/share/pnpm:$PATH"
            pnpm install --frozen-lockfile
            echo "DATABASE_URL='${DATABASE_URL}'" > .env
            echo "SESSION_SECRET='${SESSION_SECRET}'" >> .env
            export $(grep DATABASE_URL .env | xargs)
            pnpm prisma migrate deploy
            systemctl restart upscale
            systemctl restart nginx
            systemctl status upscale --no-pager
