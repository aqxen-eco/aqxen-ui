name: Deploy Upscale

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: [self-hosted]
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up node
        shell: bash -l {0}
        run: |
          nvm install 22
          nvm use 22
        
      - name: Install pnpm
        shell: bash -l {0}
        run: npm install -g pnpm

      - name: Install dependencies
        shell: bash -l {0}
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        shell: bash -l {0}
        run: pnpm lint

      - name: Build
        shell: bash -l {0}
        run: pnpm build

      - name: Archive build
        run: tar -czf build.tar.gz --exclude=.git --exclude=build.tar.gz .[!.]* *

      - name: Transfer build to host
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build.tar.gz"
          target: "/root/upscale"
          overwrite: true

      - name: Deploy new build
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/upscale
            tar -xzf build.tar.gz
            systemctl restart upscale
            systemctl restart nginx
            systemctl status upscale --no-pager
